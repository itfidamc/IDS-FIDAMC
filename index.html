<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00AA9C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FIDAMC — Registro de acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#00AA9C;
    --teal-dark:#00837a;
    --navy:#0F4761;
    --ink:#1c2326;
    --paper:#f3f6f5;
    --paper-2:#ffffff;
    --line:#d7e0de;
    --muted:#697572;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }

  html, body{
    height:100%;
    font-family:'Ubuntu', "Helvetica Neue", Arial, sans-serif;
    background:var(--paper);
    color:var(--ink);
  }

  /* ── Layout centrado verticalmente ── */
  .page{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 20px 48px;
  }

  /* ── Cabecera ── */
  .header{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:12px;
  }
  .logo{ height:40px; width:auto; }
  .divider-v{
    width:1px; height:32px;
    background:var(--line);
  }
  .eyebrow{
    font-size:12px;
    font-weight:500;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--muted);
  }

  /* ── Título ── */
  h1{
    font-size:clamp(18px, 4vw, 24px);
    font-weight:700;
    color:var(--navy);
    text-align:center;
    margin-bottom:6px;
    line-height:1.25;
  }
  .subtitle{
    font-size:14px;
    color:var(--muted);
    text-align:center;
    margin-bottom:40px;
  }

  /* ── Tarjetas de opción ── */
  .options{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:400px;
  }

  .option-card{
    display:flex;
    align-items:center;
    gap:20px;
    background:var(--paper-2);
    border:1.5px solid var(--line);
    border-radius:14px;
    padding:24px 28px;
    cursor:pointer;
    text-decoration:none;
    color:inherit;
    transition:border-color .15s, box-shadow .15s, transform .1s;
    -webkit-tap-highlight-color:transparent;
  }
  .option-card:hover,
  .option-card:focus-visible{
    border-color:var(--teal);
    box-shadow:0 0 0 3px rgba(0,170,156,.15);
    outline:none;
  }
  .option-card:active{
    transform:scale(.985);
  }

  .option-icon{
    flex-shrink:0;
    width:52px; height:52px;
    border-radius:12px;
    background:rgba(0,170,156,.1);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .option-icon svg{
    width:26px; height:26px;
    stroke:var(--teal-dark);
    fill:none;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .option-text{ flex:1; }
  .option-title{
    font-size:17px;
    font-weight:700;
    color:var(--navy);
    margin-bottom:3px;
  }
  .option-desc{
    font-size:13px;
    color:var(--muted);
    line-height:1.4;
  }

  .option-arrow{
    flex-shrink:0;
    color:var(--line);
  }
  .option-card:hover .option-arrow,
  .option-card:focus-visible .option-arrow{
    color:var(--teal);
  }

  /* ── Submenú Visitas (oculto hasta que se necesite) ── */
  .submenu{
    display:none;
    flex-direction:column;
    gap:16px;
    width:100%;
    max-width:400px;
    animation:fadeIn .2s ease;
  }
  .submenu.visible{ display:flex; }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .back-btn{
    display:flex;
    align-items:center;
    gap:6px;
    background:none;
    border:none;
    color:var(--teal-dark);
    font-family:inherit;
    font-size:14px;
    font-weight:500;
    cursor:pointer;
    padding:0 0 16px;
    -webkit-tap-highlight-color:transparent;
  }
  .back-btn:hover{ color:var(--navy); }
  .back-btn svg{
    width:16px; height:16px;
    stroke:currentColor;
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .section-label{
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:4px;
    padding-left:2px;
  }
</style>
</head>
<body>
<div class="page">

  <!-- Cabecera -->
  <div class="header">
    <img class="logo" id="logoImg" alt="FIDAMC">
    <div class="divider-v"></div>
    <p class="eyebrow">Registro de acceso</p>
  </div>

  <h1>¿Cómo vas a acceder hoy?</h1>
  <p class="subtitle">Selecciona tu tipo de acceso para continuar.</p>

  <!-- Menú principal -->
  <div class="options" id="mainMenu">

    <a class="option-card" href="empleados/ids-interno.html">
      <div class="option-icon">
        <!-- Icono: persona con credencial -->
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M6 16c0-2 1.3-3 3-3s3 1 3 3"/><line x1="15" y1="9" x2="19" y2="9"/><line x1="15" y1="13" x2="17" y2="13"/></svg>
      </div>
      <div class="option-text">
        <div class="option-title">Empleados</div>
        <div class="option-desc">Personal interno de FIDAMC</div>
      </div>
      <div class="option-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>

    <div class="option-card" id="visitasBtn" role="button" tabindex="0">
      <div class="option-icon">
        <!-- Icono: persona con maleta / visita -->
        <svg viewBox="0 0 24 24"><path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
      </div>
      <div class="option-text">
        <div class="option-title">Visitas</div>
        <div class="option-desc">Personal externo y proveedores</div>
      </div>
      <div class="option-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>

  </div>

  <!-- Submenú Visitas -->
  <div class="submenu" id="visitasMenu">
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver
    </button>

    <p class="section-label">Tipo de registro</p>

    <a class="option-card" href="visitas/ids-visita.html">
      <div class="option-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg>
      </div>
      <div class="option-text">
        <div class="option-title">IDS Visita</div>
        <div class="option-desc">Instrucciones de seguridad y firma de acceso</div>
      </div>
      <div class="option-arrow">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </a>
  </div>

</div>

<script>
  // Registro Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // Wake Lock
  let wakeLock = null;
  async function requestWakeLock() {
    if ('wakeLock' in navigator) {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
    }
  }
  requestWakeLock();
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  // Logo
  const LOGO_BASE64 = document.getElementById('logoDataHolder').textContent.trim();
  document.getElementById('logoImg').src = 'data:image/jpeg;base64,' + LOGO_BASE64;

  // Navegación: Visitas → submenú
  const visitasBtn = document.getElementById('visitasBtn');
  const mainMenu   = document.getElementById('mainMenu');
  const visitasMenu = document.getElementById('visitasMenu');
  const backBtn    = document.getElementById('backBtn');

  function showVisitas() {
    mainMenu.style.display   = 'none';
    visitasMenu.classList.add('visible');
    document.querySelector('h1').textContent = 'Tipo de registro para visitas';
    document.querySelector('.subtitle').textContent = 'Selecciona el formulario que corresponda.';
  }
  function showMain() {
    visitasMenu.classList.remove('visible');
    mainMenu.style.display = 'flex';
    document.querySelector('h1').textContent = '¿Cómo vas a acceder hoy?';
    document.querySelector('.subtitle').textContent = 'Selecciona tu tipo de acceso para continuar.';
  }

  visitasBtn.addEventListener('click', showVisitas);
  visitasBtn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') showVisitas(); });
  backBtn.addEventListener('click', showMain);
</script>
</body>
</html>
